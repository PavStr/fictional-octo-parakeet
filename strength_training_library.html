<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Strength training library</title>
<style>
  :root {
    --bg: #f7f5f2;
    --panel: #ffffff;
    --text: #1f2328;
    --muted: #5f6b76;
    --line: #d8d2cb;
    --accent: #1f5f8b;
    --accent-soft: #edf5fb;
    --chip: #f2efea;
    --ok: #2f7d32;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font: 17px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body { padding: 14px; }
  main { max-width: 980px; margin: 0 auto; }
  .shell { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 18px; box-shadow: 0 1px 0 rgba(0,0,0,.02); }
  h1 { margin: 0 0 6px; font-size: 1.7rem; line-height: 1.2; }
  h2 { margin: 0; font-size: 1.35rem; line-height: 1.25; }
  p { margin: 0; }
  .muted { color: var(--muted); }
  .topnote { margin-top: 10px; padding: 12px 14px; border-radius: 12px; background: var(--accent-soft); color: #173d58; }
  .controls { display: grid; gap: 12px; margin: 18px 0 14px; }
  .control-grid { display: grid; gap: 10px; grid-template-columns: 1.2fr 1fr; }
  label { font-size: .9rem; color: var(--muted); display: block; margin-bottom: 6px; }
  select, input[type="search"], button { width: 100%; border: 1px solid var(--line); border-radius: 12px; background: #fff; color: var(--text); min-height: 46px; padding: 10px 12px; font: inherit; }
  button { cursor: pointer; }
  .session-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 16px; }
  .tab { width: auto; padding: 10px 14px; min-height: 42px; background: var(--chip); }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .session-head { display: grid; gap: 4px; margin-bottom: 10px; }
  .actions { display: flex; gap: 10px; }
  .session-meta { display: flex; flex-wrap: wrap; gap: 10px 16px; color: var(--muted); font-size: .95rem; }
  .block { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; margin-top: 14px; background: #fff; }
  .block-head { padding: 12px 14px; background: #fbfaf8; border-bottom: 1px solid var(--line); display: grid; gap: 4px; }
  .block-rounds { font-weight: 700; }
  .block-note { color: var(--muted); font-size: .95rem; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 10px; text-align: left; vertical-align: top; border-bottom: 1px solid #ece7e1; }
  th { font-size: .88rem; color: var(--muted); font-weight: 600; background: #fff; }
  tr:last-child td { border-bottom: 0; }
  .col-done { width: 54px; text-align: center; }
  .col-video { width: 84px; text-align: right; white-space: nowrap; }
  .exercise { font-weight: 600; }
  .dose { color: var(--text); }
  a { color: var(--accent); text-underline-offset: 2px; }
  .video-missing { color: var(--muted); }
  .footer-note { margin-top: 16px; color: var(--muted); font-size: .95rem; }
  .tag { display: inline-block; padding: 2px 8px; border: 1px solid var(--line); border-radius: 999px; font-size: .8rem; color: var(--muted); background: #fff; }
  .empty { margin-top: 14px; padding: 16px; border: 1px dashed var(--line); border-radius: 14px; color: var(--muted); background: #fcfbf9; }
  input[type="checkbox"] { width: 22px; height: 22px; accent-color: var(--ok); }
  @media (max-width: 720px) {
    body { padding: 10px; }
    .shell { padding: 14px; border-radius: 16px; }
    .control-grid { grid-template-columns: 1fr; }
    .actions { flex-direction: column; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    tr { padding: 12px 12px 10px; border-bottom: 1px solid #ece7e1; }
    tr:last-child { border-bottom: 0; }
    td { border-bottom: 0; padding: 4px 0; }
    .col-done, .col-video { width: auto; text-align: left; }
    .mobile-line { display: inline; color: var(--muted); font-size: .92rem; margin-right: 6px; }
    .exercise-row-top { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  }
  @media (min-width: 721px) { .mobile-line { display: none; } }
</style>
</head>
<body>
<main>
  <section class="shell">
    <h1>Strength training library</h1>
    <p class="muted">Local single-page overview for iPhone and desktop</p>
    <div class="topnote">Rounds apply to the whole subsection. Move top to bottom inside the block, then repeat until the stated rounds are complete.</div>
    <div class="controls">
      <div class="control-grid">
        <div>
          <label for="stageSelect">Stage</label>
          <select id="stageSelect"></select>
        </div>
        <div>
          <label for="searchInput">Search current session</label>
          <input id="searchInput" type="search" placeholder="Exercise or dose">
        </div>
      </div>
      <div class="actions">
        <button id="resetSessionBtn" type="button">Reset current session checkboxes</button>
      </div>
    </div>
    <div id="stageNote"></div>
    <div id="sessionTabs" class="session-tabs"></div>
    <div id="sessionView"></div>
    <div class="footer-note">Video links need internet. Checkboxes are stored in the browser on this device.</div>
  </section>
</main>

const defaultState = { stageIndex: 0, sessionIndex: 0, search: '' };
function loadState() {
  try { return { ...defaultState, ...(JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}) }; }
  catch (e) { return { ...defaultState }; }
}
const state = loadState();
if (state.stageIndex >= DATA.length) state.stageIndex = 0;
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function checkboxKey(stageId, sessionId, blockIndex, itemIndex) { return `done:${stageId}:${sessionId}:${blockIndex}:${itemIndex}`; }
function escapeHtml(str) { return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'", '&#39;'); }
function matchesSearch(item, query) { if (!query) return true; const hay = `${item.exercise} ${item.prescription}`.toLowerCase(); return hay.includes(query.toLowerCase()); }
function renderStageOptions() {
  const select = document.getElementById('stageSelect');
  select.innerHTML = DATA.map((stage, idx) => `<option value="${idx}">${escapeHtml(stage.title)}</option>`).join('');
  select.value = String(state.stageIndex);
}
function renderSessionTabs(stage) {
  if (state.sessionIndex >= stage.sessions.length) state.sessionIndex = 0;
  const tabs = document.getElementById('sessionTabs');
  tabs.innerHTML = stage.sessions.map((session, idx) => `<button type="button" class="tab ${idx === state.sessionIndex ? 'active' : ''}" data-session-index="${idx}">${escapeHtml(session.name)}</button>`).join('');
  tabs.querySelectorAll('.tab').forEach(btn => btn.addEventListener('click', () => { state.sessionIndex = Number(btn.dataset.sessionIndex); saveState(); render(); }));
}
function renderStageNote(stage) {
  const el = document.getElementById('stageNote');
  el.innerHTML = `<div class="session-meta"><span class="tag">${escapeHtml(stage.source_title)}</span>${stage.note ? `<span class="muted">${escapeHtml(stage.note)}</span>` : ''}</div>`;
}
function renderSession(stage) {
  const session = stage.sessions[state.sessionIndex];
  const view = document.getElementById('sessionView');
  const query = state.search.trim();
  const filteredBlocks = session.blocks.map((block, blockIndex) => {
    const items = block.items.map((item, itemIndex) => ({ ...item, itemIndex })).filter(item => matchesSearch(item, query));
    return { ...block, items, blockIndex };
  }).filter(block => block.items.length);
  const blockHtml = filteredBlocks.map((block) => `
    <section class="block">
      <div class="block-head">
        <div class="block-rounds">Block ${block.blockIndex + 1} · ${escapeHtml(block.rounds || 'As written')}</div>
        <div class="block-note">Do these in sequence, then repeat the whole block.</div>
      </div>
      <table>
        <thead>
          <tr><th class="col-done">Done</th><th>Exercise</th><th>Dose</th><th class="col-video">Video</th></tr>
        </thead>
        <tbody>
          ${block.items.map((item) => {
            const key = checkboxKey(stage.id, session.id, block.blockIndex, item.itemIndex);
            const checked = localStorage.getItem(key) === '1' ? 'checked' : '';
            return `
              <tr>
                <td class="col-done"><div class="exercise-row-top"><input class="done-box" data-key="${key}" type="checkbox" ${checked}></div></td>
                <td><div class="mobile-line">Exercise</div><div class="exercise">${escapeHtml(item.exercise)}</div></td>
                <td><div class="mobile-line">Dose</div><div class="dose">${escapeHtml(item.prescription || '—')}</div></td>
                <td class="col-video"><div class="mobile-line">Video</div>${item.video ? `<a href="${escapeHtml(item.video)}" target="_blank" rel="noopener noreferrer">Demo</a>` : `<span class="video-missing">—</span>`}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </section>`).join('');
  view.innerHTML = `
    <div class="session-head">
      <h2>${escapeHtml(session.name)}</h2>
      <div class="session-meta"><span>${session.exercise_count} exercises</span><span>${session.blocks.length} subsections</span><span>${escapeHtml(session.subtitle)}</span></div>
    </div>
    ${filteredBlocks.length ? blockHtml : '<div class="empty">No exercises match the current search.</div>'}`;
  document.querySelectorAll('.done-box').forEach(box => box.addEventListener('change', () => localStorage.setItem(box.dataset.key, box.checked ? '1' : '0')));
  document.getElementById('resetSessionBtn').onclick = () => {
    session.blocks.forEach((block, blockIndex) => block.items.forEach((_, itemIndex) => localStorage.removeItem(checkboxKey(stage.id, session.id, blockIndex, itemIndex))));
    render();
  };
}
function render() { renderStageOptions(); const stage = DATA[state.stageIndex]; renderStageNote(stage); renderSessionTabs(stage); renderSession(stage); }
document.getElementById('stageSelect').addEventListener('change', (e) => { state.stageIndex = Number(e.target.value); state.sessionIndex = 0; saveState(); render(); });
document.getElementById('searchInput').value = state.search;
document.getElementById('searchInput').addEventListener('input', (e) => { state.search = e.target.value; saveState(); render(); });
render();
</script>
</body>
</html>
